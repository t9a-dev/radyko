receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"  # 任意のホストから gRPC を受け取る
      # http:
      #   endpoint: "0.0.0.0:4318"

exporters:
  debug:
    verbosity: detailed
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp]
