name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: バージョン(例:1.2.3)

env:
  CARGO_TERM_COLOR: always
  VERSION: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          name: radyko ${{ env.VERSION }}
          draft: true
          prerelease: false

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            arch_name: linux_amd64
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            arch_name: linux_arm64
            bin_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            arch_name: darwin_arm64
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch_name: windows_amd64
            bin_ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch_name: windows_arm64
            bin_ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Install mold
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444

      - name: Install cross
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release Linux musl
        if: runner.os == 'Linux'
        run: |
          cross build --release --locked --target ${{ matrix.target }}

      - name: Build release
        if: runner.os != 'Linux'
        run: |
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke test Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          target/${{ matrix.target }}/release/radyko --version

      - name: Smoke test Windows x64
        if: runner.os == 'Windows' && matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          target/${{ matrix.target }}/release/radyko.exe --version

      - name: Prepare binary artifact Unix
        if: runner.os != 'Windows'
        id: prepare_unix
        shell: bash
        run: |
          set -euxo pipefail
          BIN_NAME="radyko"
          SRC="target/${{ matrix.target }}/release/${BIN_NAME}"
          DST="radyko_${VERSION}_${{ matrix.arch_name }}"
          cp "$SRC" "$DST"
          chmod +x "$DST"
          echo "artifact_name=$DST" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$DST" >> "$GITHUB_OUTPUT"

      - name: Prepare binary artifact Windows
        if: runner.os == 'Windows'
        id: prepare_windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $BinName = "radyko"
          $Src = "target/${{ matrix.target }}/release/${BinName}.exe"
          $Dst = "radyko_${env:VERSION}_${{ matrix.arch_name }}.exe"
          Copy-Item $Src -Destination $Dst
          "artifact_name=$Dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_path=$Dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload single binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_unix.outputs.artifact_name || steps.prepare_windows.outputs.artifact_name }}
          path: ${{ steps.prepare_unix.outputs.artifact_path || steps.prepare_windows.outputs.artifact_path }}
          if-no-files-found: error

  upload_release_assets:
    needs:
      - create_release
      - build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: linux_amd64
            bin_ext: ""
          - arch_name: linux_arm64
            bin_ext: ""
          - arch_name: darwin_arm64
            bin_ext: ""
          - arch_name: windows_amd64
            bin_ext: ".exe"
          - arch_name: windows_arm64
            bin_ext: ".exe"

    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: radyko_${{ env.VERSION }}_${{ matrix.arch_name }}${{ matrix.bin_ext }}
          path: artifacts

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          files: artifacts/radyko_${{ env.VERSION }}_${{ matrix.arch_name }}${{ matrix.bin_ext }}
          fail_on_unmatched_files: true
          draft: true
          prerelease: false